name: plant_smorfeues
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch with CUDA 12.1 (adjust cuda version to match your driver)
  - pytorch>=2.2.0
  - pytorch-cuda=12.1
  - torchvision

  # Scientific stack
  - numpy>=1.24.0
  - scipy>=1.11.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - tqdm>=4.65.0

  # HDF5
  - h5py>=3.9.0

  # Config and YAML
  - pyyaml>=6.0

  # pip-only packages
  - pip
  - pip:
    - lightning>=2.0.0
    - pytorch-lightning>=2.0.0
    - transformers>=4.35.0
    - biopython>=1.81
    - gffutils>=0.12.0

    # mamba_ssm MUST be installed from source after activating this environment.
    # Run the following commands after `conda env create -f environment.yml`:
    #
    #   conda activate plant_smorfeues
    #   pip install causal-conv1d
    #   pip install mamba-ssm
    #
    # See: https://github.com/state-spaces/mamba
